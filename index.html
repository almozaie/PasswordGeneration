<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <h1>
      Generate a <br />
      <span>random password</span>
    </h1>

    <p>Never use an insecure password again.</p>

    <button class="generate-btn" onclick="passwordBox()">Generate passwords</button>

    <div class="toggle-group">
      <span class="toggle-label">Symbols</span>
      <label class="toggle-switch">
        <input type="checkbox" id="symbols-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="line"></div>

    <div class="passwords">
      <div class="password-box">
        <span id="text1"></span>
        <button class="copy-btn" onclick="copyPassword('text1', this)" title="Copy">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
      <div class="password-box">
        <span id="text2"></span>
        <button class="copy-btn" onclick="copyPassword('text2', this)" title="Copy">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
